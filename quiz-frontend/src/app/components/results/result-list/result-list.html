<div class="container">
  <div class="header">
    <h2>🏆 Results</h2>
    <a routerLink="/results/add" class="btn-add">+ Add Result</a>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Quiz ID</th>
        <th>Score</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <p>Total Results: {{ results.length }}</p>
 <tbody>
  <tr *ngFor="let r of results">
    <td>{{ r.id }}</td>
    <td>{{ r.userId }}</td>
    <td>{{ r.quizId }}</td>
    <td><strong>{{ r.score }}</strong></td>
    <td>{{ r.dateObtained }}</td>
    <td>
      <a [routerLink]="['/results/edit', r.id]" class="btn-edit">Edit</a>
      <button (click)="delete(r.id!)" class="btn-delete">Delete</button>
    </td>
  </tr>
</tbody>
  </table>
</div>
