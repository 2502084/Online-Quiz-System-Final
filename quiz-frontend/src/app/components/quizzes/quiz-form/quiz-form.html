<div class="container">
  <h2>{{ isEdit ? 'Edit Quiz' : 'Add Quiz' }}</h2>

  <form (ngSubmit)="save()" novalidate>
    <div class="form-group">
      <label>Title</label>
      <input [(ngModel)]="quiz.title" name="title" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="quiz.description" name="description" rows="3"></textarea>
    </div>

    <div class="btn-row">
      <button type="submit">{{ isEdit ? 'Update' : 'Save' }}</button>
      <a routerLink="/quizzes">Cancel</a>
    </div>
  </form>
</div>
