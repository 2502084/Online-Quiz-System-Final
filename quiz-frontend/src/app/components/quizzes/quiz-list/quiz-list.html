<div class="container">
  <div class="header">
    <h2>📝 Quizzes</h2>
    <a routerLink="/quizzes/add" class="btn-add">+ Add Quiz</a>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let quiz of quizzes">
        <tr>
          <td>{{ quiz.id }}</td>
          <td>{{ quiz.title }}</td>
          <td>{{ quiz.description }}</td>
          <td>
            <a [routerLink]="['/quizzes/edit', quiz.id]" class="btn-edit">Edit</a>
            <button (click)="delete(quiz.id!)" class="btn-delete">Delete</button>
          </td>
        </tr>
      </ng-container>
    </tbody>
  </table>
</div>
