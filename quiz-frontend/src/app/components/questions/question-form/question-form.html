<div class="container">
  <h2>{{ isEdit ? 'Edit Question' : 'Add Question' }}</h2>

  <form (ngSubmit)="save()" novalidate>
    <div class="form-group">
      <label>Quiz ID</label>
      <input [(ngModel)]="question.quizId" name="quizId" type="number" />
    </div>
    <div class="form-group">
      <label>Question Text</label>
      <textarea [(ngModel)]="question.questionText" name="questionText" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>Option A</label>
      <input [(ngModel)]="question.optionA" name="optionA" />
    </div>
    <div class="form-group">
      <label>Option B</label>
      <input [(ngModel)]="question.optionB" name="optionB" />
    </div>
    <div class="form-group">
      <label>Option C</label>
      <input [(ngModel)]="question.optionC" name="optionC" />
    </div>
    <div class="form-group">
      <label>Option D</label>
      <input [(ngModel)]="question.optionD" name="optionD" />
    </div>
    <div class="form-group">
      <label>Correct Answer (A/B/C/D)</label>
      <select [(ngModel)]="question.correctAnswer" name="correctAnswer">
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
    </div>

    <div class="btn-row">
      <button type="submit">{{ isEdit ? 'Update' : 'Save' }}</button>
      <a routerLink="/questions">Cancel</a>
    </div>
  </form>
</div>
